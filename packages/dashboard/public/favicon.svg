<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Shell body -->
  <rect x="10" y="6" width="12" height="2" fill="#16A34A"/>
  <rect x="8" y="8" width="16" height="2" fill="#16A34A"/>
  <rect x="8" y="10" width="16" height="2" fill="#15803D"/>
  <rect x="8" y="12" width="16" height="2" fill="#16A34A"/>
  <rect x="8" y="14" width="16" height="2" fill="#15803D"/>
  <rect x="10" y="16" width="12" height="2" fill="#16A34A"/>
  <!-- Shell pattern -->
  <rect x="12" y="8" width="2" height="2" fill="#166534"/>
  <rect x="18" y="8" width="2" height="2" fill="#166534"/>
  <rect x="14" y="10" width="4" height="2" fill="#166534"/>
  <rect x="10" y="12" width="2" height="2" fill="#166534"/>
